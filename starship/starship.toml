"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#728f71)\
[ пҢҜ ](bg:#728f71 fg:#090c0c)\
[оӮҙ](bg:#5e735e fg:#728f71)\
$directory\
[оӮҙ](fg:#5e735e bg:#4c5e4c)\
$git_branch\
$git_status\
[оӮҙ](fg:#4c5e4c bg:#354c35)\
$rust\
$golang\
$python\
$bun\
$kubernetes\
$aws\
$azure\
[оӮҙ](fg:#354c35 bg:#1f2d1f)\
$time\
[оӮҙ ](fg:#1f2d1f)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#5e735e"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"rust" = "оһЁ"
"golang" = "оҳ§"
"cncf" = "оүЁ"
"webd" = "у°ҫ”"

[git_branch]
symbol = "пҗҳ"
style = "bg:#4c5e4c"
format = '[[ $symbol $branch ](fg:#9acb9a bg:#4c5e4c)]($style)'

[git_status]
style = "bg:#4c5e4c"
format = '[[($all_status$ahead_behind )](fg:#9acb9a bg:#4c5e4c)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#354c35"
format = '[[ $symbol ($version) ](fg:#9acb9a bg:#354c35)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#354c35"
format = '[[ $symbol ($version) ](fg:#9acb9a bg:#354c35)]($style)'

[bun]
symbol = "оқҜ"
style = "bg:#354c35"
format = '[[$symbol $version](fg:#9acb9a bg:#354c35)]($style)'

[python]
symbol = "оңј"
style = "bg:#354c35"
format = '[[ $symbol ($version) ](fg:#9acb9a bg:#354c35)]($style)'

[kubernetes]
symbol = "о қ"
style = "bg:#354c35"
format = '[ [$symbol $context \($namespace\)](fg:#9acb9a bg:#354c35) ]($style)'
disabled = false

[aws]
symbol = "оһӯ"
style = "bg:#354c35"
format = '[ [$symbol $region](fg:#9acb9a bg:#354c35) ]($style)'

[azure]
symbol = "оқ”"
style = "bg:#354c35"
format = '[ [$symbol $username](fg:#9acb9a bg:#354c35) ]($style)'
disabled = false

[time]
disabled = false
time_format = "%R"
style = "bg:#1f2d1f"
format = '[[ пҗә $time ](fg:#9acb9a bg:#1f2d1f)]($style)'
