format = """
[в–‘в–’в–“](color7)\
[ у°ЈҮ ](bg:color7 fg:color1)\
[оӮҙ](bg:color4 fg:color7)\
$directory\
$git_branch\
$git_status\
$rust\
$golang\
$python\
$bun\
$kubernetes\
$aws\
$azure\
$time\
[оӮҙ ](fg:color6)\
\n$character"""

palette = 'colors'

[palettes.colors]
mustard = '#af8700'
color1 = '{{colors.primary_fixed_dim.default.hex}}'
color2 = '{{colors.on_primary.default.hex}}'
color3 = '{{colors.on_surface_variant.default.hex}}'
color4 = '{{colors.surface_container.default.hex}}'
color5 = '{{colors.on_primary.default.hex}}'
color6 = '{{colors.surface_dim.default.hex}}'
color7 = '{{colors.surface.default.hex}}'
color8 = '{{colors.primary.default.hex}}'
color9 = '{{colors.tertiary.default.hex}}'

[character]
success_symbol = "[вқҜ](color9 bold)"
error_symbol = "[вқҜ](red bold)"
vicmd_symbol = "[вқ®](color9)"

[directory]
format = "[оӮ¶](fg:color1 bg:color4)[у°үӢ](bg:color1 fg:color2)[оӮҙ](fg:color1 bg:color4)[ $path ](fg:color3 bg:color4)[оӮҙ](fg:color4 bg:color6)"
truncation_length = 3

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"rust" = "оһЁ"
"golang" = "оҳ§"
"cncf" = "оүЁ"
"webd" = "у°ҫ”"

[git_branch]
symbol = "пҗҳ"
format = "[оӮ¶](fg:color8 bg:color6)[${symbol}](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)[ $branch](fg:color3 bg:color6)[оӮҙ](fg:color6 bg:color6)"

[git_status]
format = "[([${all_status}${ahead_behind}](fg:color3 bg:color6))](bg:color6)[оӮҙ](fg:color6 bg:color6)"

[rust]
symbol = "оһЁ"
format = "[оӮ¶](fg:#b7310e bg:color6)[${symbol}${version}](bg:#b7310e fg:#ffffff)[оӮҙ](fg:#b7310e bg:color6)[оӮҙ](fg:color6 bg:color6)"

[golang]
symbol = "оҳ§"
format = "[оӮ¶](fg:#0a678c bg:color6)[${symbol}${version}](bg:#0a678c fg:#ffffff)[оӮҙ](fg:#0a678c bg:color6)[оӮҙ](fg:color6 bg:color6)"

[bun]
symbol = "оқҜ"
format = "[оӮ¶](fg:color8 bg:color6)[${symbol}${version}](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)[оӮҙ](fg:color6 bg:color6)"

[python]
symbol = "оңј"
format = "[оӮ¶](fg:color8 bg:color6)[${symbol}${version}](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)([ ${virtualenv}](fg:color3 bg:color6))[оӮҙ](fg:color6 bg:color6)"

[kubernetes]
symbol = "уұғҫ"
format = "[оӮ¶](fg:color8 bg:color6)[${symbol}](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)[ $context ($namespace)](fg:color3 bg:color6)[оӮҙ](fg:color6 bg:color6)"
disabled = false

[aws]
symbol = "оһӯ"
format = "[оӮ¶](fg:color8 bg:color6)[${symbol}](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)[ $region](fg:color3 bg:color6)[оӮҙ](fg:color6 bg:color6)"

[azure]
symbol = "оқ”"
format = "[оӮ¶](fg:color8 bg:color6)[${symbol}](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)[ $username](fg:color3 bg:color6)[оӮҙ](fg:color6 bg:color6)"
disabled = false

[time]
disabled = false
time_format = "%R"
format = "[оӮ¶](fg:color8 bg:color6)[пҗә](bg:color8 fg:color5)[оӮҙ](fg:color8 bg:color6)[ $time](fg:color3 bg:color6)[оӮҙ](fg:color6)"
