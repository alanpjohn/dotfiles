[global]
backup_directory = ".backups"
backup_suffix = ".backup"
respect_gitignore = true

[[applications]]
name = "tmux"
type = "directory"
repo_path = "tmux"
config_path = "tmux"
exclude = ["plugins/", "generated.conf"]

[[applications.file_mappings]]
repo_name = "tmux.conf"
config_name = "tmux.conf"

[[applications]]
name = "zed"
type = "directory"
repo_path = "zed"
config_path = "zed"
recursive = true
include = ["*.jsonc", "*.json", "tasks.json"]
exclude = ["*.backup", "settings_backup.json", "settings.json", "themes/"]

[[applications.file_mappings]]
repo_name = "settings.jsonc"
config_name = "settings.json"

[[applications.file_mappings]]
repo_name = "tasks.jsonc"
config_name = "tasks.json"

[[applications]]
name = "ghostty"
type = "directory"
repo_path = "ghostty"
config_path = "ghostty"
exclude = ["*backup*"]

[[applications.file_mappings]]
repo_name = "config"
config_name = "config"

[[applications]]
name = "nvim"
type = "directory"
repo_path = "nvim"
config_path = "nvim"
recursive = true
exclude = ["lazy-lock.json", "tags", ".luarc.json", "spell/", ".github/", "matugen.lua","plugins/dankcolors.lua"]

[[applications]]
name = "opencode"
type = "directory"
repo_path = "opencode"
config_path = "opencode"
recursive = true
exclude = ["node_modules/", "package.json", "package-lock.json", "bun.lock", ".gitignore", "plans/", ".opencode", "themes/"]

[[applications]]
name = "fish"
type = "directory"
repo_path = "fish"
config_path = "fish"
exclude = ["functions/", "completions/", "conf.d/", "themes/", "fish_variables", "fishd.*"]

[[applications]]
name = "matugen"
type = "directory"
repo_path = "matugen"
config_path = "matugen"
recursive = true
